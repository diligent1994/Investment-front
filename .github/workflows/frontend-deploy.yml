name: Build and Push Frontend to ACR

on:
  push:
    branches: [ main ]  # 提交main自动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================
      # 第一步：纯构建！不登录阿里云，无权限报错
      # ======================
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: investment_frontend:latest

      # ======================
      # 第二步：构建完成后，登录阿里云私有仓库
      # ======================
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # ======================
      # 第三步：打标签 + 推送到阿里云
      # ======================
      - name: Tag and push to Aliyun ACR
        run: |
          docker tag investment_frontend:latest ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/investment_frontend:latest
          docker push ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/investment_frontend:latest